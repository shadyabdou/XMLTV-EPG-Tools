      - name: Run XMLTV Merge
        run: |
          python -c "
          import requests, gzip, io
          headers = {'User-Agent': 'Mozilla/5.0 (VeloTV-EPG-Bot/1.0)'}
          urls = [
              'https://iptv-org.github.io/epg/guides/world.xml.gz',
              'https://epgshare01.online/epgshare01/epg_ripper_ALL.xml.gz',
              'https://beoutq.live/epg/beoutq.xml.gz',
              'https://iptv-epg.org/epg.xml.gz',
              'https://epg.best/free.xml.gz'
          ]
          
          with open('epg.xml', 'wb') as out:
              out.write(b'<?xml version=\"1.0\" encoding=\"UTF-8\"?><tv>')
              for url in urls:
                  print(f'Fetching: {url}')
                  try:
                      r = requests.get(url, headers=headers, timeout=30)
                      if r.status_code == 200:
                          content = r.content
                          if url.endswith('.gz'):
                              content = gzip.decompress(content)
                          # Strip the XML declaration and <tv> tags from sub-files to merge properly
                          clean_content = content.replace(b'<?xml version=\"1.0\" encoding=\"UTF-8\"?>', b'').replace(b'<tv>', b'').replace(b'</tv>', b'')
                          out.write(clean_content)
                          print(f' Success: {len(content)} bytes')
                      else:
                          print(f' Failed: HTTP {r.status_code}')
                  except Exception as e:
                      print(f' Error: {e}')
              out.write(b'</tv>')
          "
          gzip -9 -c epg.xml > epg.xml.gz
          ls -lh epg.xml.gz # This will print the size in the logs